services:
  wallet-service-db:
    image: postgres:16-alpine
    container_name: wallet-service-db
    environment:
      - 'POSTGRES_USER=postgres'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_DB=wallet-service'
    ports:
      - '15432:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 500m
    networks:
      - wallet-network
networks:
  wallet-network:
    driver: bridge